name: Daily Blog Generation

on:
  schedule:
    # 6:00 AM ET (10:00 UTC during EDT, 11:00 UTC during EST)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-blogs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Generate blog posts
        env:
          AWS_REGION: us-east-1
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate-blogs

      - name: Create branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          RUN_ID="${{ github.run_id }}"
          BRANCH="blog/daily-posts-${DATE}-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add src/content/blog/
          git add public/images/blog/ 2>/dev/null || true

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new blog posts generated. Exiting."
            exit 0
          fi

          git commit -m "content: add daily blog posts for ${DATE}"
          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --title "Blog posts for ${DATE}" \
            --body "$(cat <<EOF
          ## Daily Blog Posts

          Auto-generated blog posts:

          $(git diff --name-only HEAD~1 | grep "src/content/blog/" | sed 's/src\/content\/blog\//- /')

          ---
          *Auto-merged. To rollback: `git revert HEAD` on main and push.*
          EOF
          )" \
            --base main \
            --head "${BRANCH}")

          # Auto-merge the PR
          gh pr merge "${PR_URL}" --merge --delete-branch
